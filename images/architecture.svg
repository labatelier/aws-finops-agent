<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 820" font-family="'Space Grotesk','Segoe UI',Arial,sans-serif" role="img" aria-label="Architecture multi-agents FinOps Boussole — Amazon Bedrock AgentCore">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#37475A"/></marker>
    <marker id="ahTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#01A88D"/></marker>
    <marker id="ahTealR" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M10,0 L0,5 L10,10 z" fill="#01A88D"/></marker>
    <marker id="ahRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#DD344C"/></marker>
    <marker id="ahPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8C4FFF"/></marker>
    <marker id="ahGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1B9E4B"/></marker>
  </defs>

  <!-- background -->
  <rect width="1260" height="820" fill="#f8fafc"/>

  <!-- title -->
  <text x="36" y="36" fill="#232F3E" font-size="20" font-weight="700">Boussole FinOps — Architecture multi-agents</text>
  <rect x="36" y="46" width="310" height="3" rx="1.5" fill="#FF9900"/>
  <text x="36" y="68" fill="#5A6B7B" font-size="12.5" font-weight="500">Amazon Bedrock AgentCore · Boucle Voir → Anticiper → Agir · TCO (AWS + hors-AWS)</text>

  <!-- ============ CONTAINERS (back to front) ============ -->
  <!-- AWS Cloud -->
  <rect x="150" y="88" width="930" height="680" rx="14" fill="#eef4fb" stroke="#9bb4d4" stroke-width="1.8" stroke-dasharray="8 5"/>
  <text x="174" y="112" fill="#48607f" font-size="12.5" font-weight="700">☁ AWS Cloud · eu-west-1</text>

  <!-- AgentCore -->
  <rect x="170" y="126" width="460" height="622" rx="12" fill="#f6eefb" stroke="#c9a3e6" stroke-width="1.6"/>
  <text x="192" y="150" fill="#7028b0" font-size="13" font-weight="700">Amazon Bedrock AgentCore</text>

  <!-- Runtime sub-box -->
  <rect x="190" y="310" width="250" height="320" rx="10" fill="#fff" stroke="#d8dfe8" stroke-width="1.4"/>
  <text x="206" y="332" fill="#5A6B7B" font-size="11" font-weight="700">Runtime · 3 agents</text>

  <!-- Gateway + Policy column -->
  <rect x="460" y="310" width="150" height="320" rx="10" fill="#faf5ff" stroke="#d8cbe8" stroke-width="1.2"/>
  <text x="535" y="332" fill="#7028b0" font-size="11" font-weight="600" text-anchor="middle">Couche de contrôle</text>

  <!-- Tools column -->
  <rect x="660" y="126" width="160" height="622" rx="10" fill="#fff7ef" stroke="#f0c79a" stroke-width="1.4"/>
  <text x="740" y="150" fill="#b35600" font-size="12" font-weight="700" text-anchor="middle">Outils · Lambda</text>

  <!-- AWS Sources column -->
  <rect x="860" y="126" width="200" height="622" rx="10" fill="#fef0f5" stroke="#f0b6d0" stroke-width="1.4"/>
  <text x="960" y="150" fill="#a50d57" font-size="12" font-weight="700" text-anchor="middle">Sources &amp; cibles</text>

  <!-- Hors-AWS box -->
  <rect x="1098" y="320" width="148" height="200" rx="10" fill="#edf8f0" stroke="#9bd3ad" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="1172" y="344" fill="#1B7E3C" font-size="12" font-weight="700" text-anchor="middle">Hors-AWS</text>

  <!-- ============ NODES ============ -->
  <!-- USER -->
  <rect x="30" y="340" width="100" height="80" rx="10" fill="#5A6B87" stroke="#36465A" stroke-width="1.4"/>
  <text x="80" y="370" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Équipe FinOps</text>
  <text x="80" y="386" font-size="10" fill="#cfd8e3" text-anchor="middle">Inès · Tom</text>
  <text x="80" y="406" font-size="16" text-anchor="middle">🧑‍💼</text>

  <!-- AgentCore : Identity -->
  <rect x="200" y="170" width="100" height="50" rx="8" fill="#DD344C"/>
  <text x="250" y="193" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Identity</text>
  <text x="250" y="208" font-size="9.5" fill="#ffc9d2" text-anchor="middle">authentification</text>

  <!-- AgentCore : Memory -->
  <rect x="320" y="170" width="100" height="50" rx="8" fill="#01A88D"/>
  <text x="370" y="193" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Memory</text>
  <text x="370" y="208" font-size="9.5" fill="#b6ece2" text-anchor="middle">contexte session</text>

  <!-- AgentCore : Observability -->
  <rect x="200" y="240" width="220" height="44" rx="8" fill="#1F9E8F"/>
  <text x="310" y="260" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Observability</text>
  <text x="310" y="275" font-size="9.5" fill="#b6ece2" text-anchor="middle">traces → CloudWatch</text>

  <!-- Argus -->
  <rect x="206" y="350" width="220" height="70" rx="8" fill="#01A88D"/>
  <text x="232" y="378" font-size="22">👁️</text>
  <text x="268" y="378" font-size="13" font-weight="700" fill="#fff">Argus</text>
  <text x="268" y="396" font-size="10" fill="#b6ece2">Analyste · lecture seule</text>
  <rect x="350" y="356" width="66" height="18" rx="4" fill="#017866"/><text x="383" y="369" font-size="9.5" font-weight="600" fill="#fff" text-anchor="middle">VOIR</text>

  <!-- Sibylle -->
  <rect x="206" y="436" width="220" height="70" rx="8" fill="#01A88D"/>
  <text x="232" y="464" font-size="22">🔮</text>
  <text x="268" y="464" font-size="13" font-weight="700" fill="#fff">Sibylle</text>
  <text x="268" y="482" font-size="10" fill="#b6ece2">Prévision + alerte proactive</text>
  <rect x="350" y="442" width="66" height="18" rx="4" fill="#017866"/><text x="383" y="455" font-size="9.5" font-weight="600" fill="#fff" text-anchor="middle">ANTICIPER</text>

  <!-- Faucon -->
  <rect x="206" y="522" width="220" height="70" rx="8" fill="#01A88D"/>
  <text x="232" y="550" font-size="22">🦅</text>
  <text x="268" y="550" font-size="13" font-weight="700" fill="#fff">Faucon</text>
  <text x="268" y="568" font-size="10" fill="#b6ece2">Optimiseur · action</text>
  <rect x="350" y="528" width="66" height="18" rx="4" fill="#017866"/><text x="383" y="541" font-size="9.5" font-weight="600" fill="#fff" text-anchor="middle">AGIR</text>

  <!-- Gateway -->
  <rect x="470" y="360" width="130" height="56" rx="8" fill="#8C4FFF"/>
  <text x="535" y="386" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Gateway</text>
  <text x="535" y="402" font-size="9.5" fill="#dcc8ff" text-anchor="middle">expose outils (MCP)</text>

  <!-- Policy -->
  <rect x="470" y="540" width="130" height="56" rx="8" fill="#DD344C"/>
  <text x="535" y="566" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Policy</text>
  <text x="535" y="582" font-size="9.5" fill="#ffc9d2" text-anchor="middle">garde-fous · env=dev</text>

  <!-- TOOLS -->
  <g text-anchor="middle">
    <rect x="680" y="170" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="192" font-size="11" font-weight="700" fill="#fff">CloudWatch</text><text x="740" y="207" font-size="9" fill="#ffd9b3">métriques usage</text>
    <rect x="680" y="240" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="262" font-size="11" font-weight="700" fill="#fff">CUR / Orgs</text><text x="740" y="277" font-size="9" fill="#ffd9b3">coûts multi-comptes</text>
    <rect x="680" y="310" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="332" font-size="11" font-weight="700" fill="#fff">Trusted Advisor</text><text x="740" y="347" font-size="9" fill="#ffd9b3">checks gratuits</text>
    <rect x="680" y="395" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="417" font-size="11" font-weight="700" fill="#fff">Licences</text><text x="740" y="432" font-size="9" fill="#ffd9b3">API externe</text>
    <rect x="680" y="465" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="487" font-size="11" font-weight="700" fill="#fff">OnPrem</text><text x="740" y="502" font-size="9" fill="#ffd9b3">coûts datacenter</text>
    <rect x="680" y="560" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="582" font-size="11" font-weight="700" fill="#fff">Notification</text><text x="740" y="597" font-size="9" fill="#ffd9b3">→ SNS</text>
    <rect x="680" y="650" width="120" height="50" rx="7" fill="#ED7100"/><text x="740" y="672" font-size="11" font-weight="700" fill="#fff">Remediation</text><text x="740" y="687" font-size="9" fill="#ffd9b3">stop EC2/RDS</text>
  </g>

  <!-- AWS SOURCES -->
  <g text-anchor="middle">
    <rect x="880" y="170" width="160" height="44" rx="7" fill="#E7157B"/><text x="960" y="196" font-size="11" font-weight="600" fill="#fff">Amazon CloudWatch</text>
    <rect x="880" y="232" width="160" height="44" rx="7" fill="#E7157B"/><text x="960" y="252" font-size="11" font-weight="600" fill="#fff">Organizations / CUR</text><text x="960" y="266" font-size="9" fill="#ffc5da">Cost &amp; Usage Reports</text>
    <rect x="880" y="294" width="160" height="44" rx="7" fill="#E7157B"/><text x="960" y="320" font-size="11" font-weight="600" fill="#fff">Trusted Advisor</text>
    <rect x="880" y="560" width="160" height="44" rx="7" fill="#8C4FFF"/><text x="960" y="586" font-size="11" font-weight="600" fill="#fff">Amazon SNS</text>
    <rect x="880" y="640" width="160" height="52" rx="7" fill="#ED7100"/><text x="960" y="664" font-size="11" font-weight="600" fill="#fff">EC2 / RDS</text><text x="960" y="680" font-size="9" fill="#ffd9b3">ressources env=dev</text>
  </g>

  <!-- HORS-AWS -->
  <g text-anchor="middle">
    <rect x="1112" y="366" width="120" height="46" rx="7" fill="#1B9E4B"/><text x="1172" y="392" font-size="11" font-weight="600" fill="#fff">API licences SaaS</text>
    <rect x="1112" y="438" width="120" height="46" rx="7" fill="#1B9E4B"/><text x="1172" y="464" font-size="11" font-weight="600" fill="#fff">Datacenter on-prem</text>
  </g>

  <!-- ============ ARROWS ============ -->
  <!-- 1. USER -> Identity -->
  <path d="M130,370 L198,195" fill="none" stroke="#37475A" stroke-width="2.2" marker-end="url(#ah)"/>
  <!-- 2. Identity -> Runtime -->
  <path d="M250,220 L250,348" fill="none" stroke="#37475A" stroke-width="2.2" marker-end="url(#ah)"/>
  <!-- Memory <-> Argus -->
  <path d="M370,220 L370,348" fill="none" stroke="#01A88D" stroke-width="2" marker-end="url(#ahTeal)" marker-start="url(#ahTealR)"/>
  <!-- 3. Agents -> Gateway -->
  <path d="M426,388 L468,388" fill="none" stroke="#8C4FFF" stroke-width="2.2" marker-end="url(#ahPurple)"/>
  <path d="M426,471 L460,471 L460,400 L468,400" fill="none" stroke="#8C4FFF" stroke-width="1.8" marker-end="url(#ahPurple)"/>
  <!-- Sibylle -> Notification tool direct -->
  <path d="M426,471 L460,471 L460,585 L678,585" fill="none" stroke="#01A88D" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#ahTeal)"/>
  <!-- 4. Gateway -> Tools -->
  <path d="M600,375 L678,195" fill="none" stroke="#8C4FFF" stroke-width="1.8" marker-end="url(#ahPurple)"/>
  <path d="M600,380 L678,265" fill="none" stroke="#8C4FFF" stroke-width="1.8" marker-end="url(#ahPurple)"/>
  <path d="M600,385 L678,335" fill="none" stroke="#8C4FFF" stroke-width="1.8" marker-end="url(#ahPurple)"/>
  <path d="M600,393 L678,420" fill="none" stroke="#8C4FFF" stroke-width="1.8" marker-end="url(#ahPurple)"/>
  <path d="M600,400 L678,490" fill="none" stroke="#8C4FFF" stroke-width="1.8" marker-end="url(#ahPurple)"/>
  <!-- 5. Tools -> Sources AWS -->
  <path d="M800,195 L878,192" fill="none" stroke="#37475A" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M800,265 L878,254" fill="none" stroke="#37475A" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M800,335 L878,316" fill="none" stroke="#37475A" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- Tools -> Hors-AWS -->
  <path d="M800,420 L1110,389" fill="none" stroke="#1B9E4B" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ahGreen)"/>
  <path d="M800,490 L1110,461" fill="none" stroke="#1B9E4B" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ahGreen)"/>
  <!-- Notification -> SNS -->
  <path d="M800,585 L878,582" fill="none" stroke="#37475A" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- 6. Faucon -> Policy -->
  <path d="M426,557 L468,563" fill="none" stroke="#DD344C" stroke-width="2.2" marker-end="url(#ahRed)"/>
  <!-- 7. Policy -> Remediation -->
  <path d="M600,568 L678,675" fill="none" stroke="#DD344C" stroke-width="2" marker-end="url(#ahRed)"/>
  <!-- Remediation -> EC2/RDS -->
  <path d="M800,675 L878,666" fill="none" stroke="#37475A" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- SNS -> USER (return, dashed teal) -->
  <path d="M960,604 L960,740 L80,740 L80,422" fill="none" stroke="#01A88D" stroke-width="2.2" stroke-dasharray="7 5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ahTeal)"/>

  <!-- ============ STEP BADGES ============ -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <circle cx="160" cy="280" r="11" fill="#fff" stroke="#37475A" stroke-width="1.8"/><text x="160" y="284" fill="#232F3E">1</text>
    <circle cx="250" cy="290" r="11" fill="#fff" stroke="#37475A" stroke-width="1.8"/><text x="250" y="294" fill="#232F3E">2</text>
    <circle cx="448" cy="388" r="11" fill="#fff" stroke="#8C4FFF" stroke-width="1.8"/><text x="448" y="392" fill="#7028b0">3</text>
    <circle cx="638" cy="310" r="11" fill="#fff" stroke="#8C4FFF" stroke-width="1.8"/><text x="638" y="314" fill="#7028b0">4</text>
    <circle cx="843" cy="254" r="11" fill="#fff" stroke="#37475A" stroke-width="1.8"/><text x="843" y="258" fill="#232F3E">5</text>
    <circle cx="520" cy="740" r="11" fill="#fff" stroke="#01A88D" stroke-width="1.8"/><text x="520" y="744" fill="#017866">6</text>
    <circle cx="448" cy="557" r="11" fill="#fff" stroke="#DD344C" stroke-width="1.8"/><text x="448" y="561" fill="#DD344C">7</text>
  </g>

  <!-- ============ ARROW LABELS ============ -->
  <g font-size="9.5" font-weight="600" fill="#5A6B7B">
    <text x="135" y="265">question / commande</text>
    <text x="256" y="290">authentifie</text>
    <text x="376" y="296" fill="#01A88D">contexte</text>
    <text x="435" y="376" fill="#8C4FFF">appel d'outil</text>
    <text x="438" y="548" fill="#DD344C">action</text>
    <text x="605" y="625" fill="#DD344C">si env=dev</text>
    <text x="470" y="756" fill="#01A88D">alerte / validation humaine</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(36,780)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#232F3E">Légende :</text>
    <rect x="70" y="-10" width="14" height="14" rx="3" fill="#01A88D"/><text x="90" y="2" font-size="10" fill="#5A6B7B">Agent / ML</text>
    <rect x="160" y="-10" width="14" height="14" rx="3" fill="#ED7100"/><text x="180" y="2" font-size="10" fill="#5A6B7B">Compute / Lambda</text>
    <rect x="290" y="-10" width="14" height="14" rx="3" fill="#DD344C"/><text x="310" y="2" font-size="10" fill="#5A6B7B">Sécurité / Policy</text>
    <rect x="410" y="-10" width="14" height="14" rx="3" fill="#8C4FFF"/><text x="430" y="2" font-size="10" fill="#5A6B7B">App Integration / Gateway</text>
    <rect x="580" y="-10" width="14" height="14" rx="3" fill="#E7157B"/><text x="600" y="2" font-size="10" fill="#5A6B7B">Management / Monitoring</text>
    <rect x="750" y="-10" width="14" height="14" rx="3" fill="#1B9E4B"/><text x="770" y="2" font-size="10" fill="#5A6B7B">Hors-AWS</text>
    <line x1="870" y1="-4" x2="910" y2="-4" stroke="#5A6B7B" stroke-width="1.8" stroke-dasharray="5 3"/><text x="918" y="2" font-size="10" fill="#5A6B7B">flux async / externe</text>
  </g>
</svg>
